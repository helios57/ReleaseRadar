server {
    listen       80 default_server;
    server_name  _;

    # SPA root
    root   /usr/share/nginx/html;
    index  index.html;

    # WebSocket live-update channel. Exact-match so it wins over the /api/
    # prefix below; needs HTTP/1.1 + Upgrade and a long read timeout so idle
    # sockets aren't reaped (server pings every ~20s).
    location = /api/ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ReleaseRadar API + auth routes proxy to the Go backend.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Keycloak: proxy /realms/* and /resources/* so both the browser and the
    # backend reach it through the same public origin.
    location /realms/ {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location /resources/ {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
    }
    location /js/ {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host              $host;
    }

    location /healthz {
        proxy_pass         http://backend:8080/healthz;
    }

    # SPA fallback for Angular's hash-routing safety net.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
